services:
  # PostgreSQL Database with pg_cron for scheduled jobs
  db:
    build:
      context: .
      dockerfile: .docker/postgres/Dockerfile
    container_name: footballhome_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: footballhome
      POSTGRES_USER: footballhome_user
      POSTGRES_PASSWORD: footballhome_pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      ENVIRONMENT: ${ENVIRONMENT:-dev}  # dev or production
    ports:
      - "5432:5432"
    volumes:
      # Mount data folder to neutral location to prevent auto-loading
      - ./database/data:/app/data:ro,Z
      # Persistent data storage
      - db_data:/var/lib/postgresql/data
    networks:
      - footballhome_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U footballhome_user -d footballhome"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s
    # Required for pg_cron with reasonable logging (DDL only)
    command: >
      postgres
      -c shared_preload_libraries=pg_cron
      -c cron.database_name=footballhome
      -c log_statement=ddl
      -c log_duration=off
      -c log_min_duration_statement=1000
      -c log_line_prefix='%t [%p] %u@%d '
      -c client_min_messages=notice

  # C++ Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: footballhome_backend
    restart: unless-stopped
    env_file: ./env
    environment:
      POSTGRES_PASSWORD: footballhome_pass
      INSTAGRAM_USER_ID: ${INSTAGRAM_USER_ID:-26233831926285183}
      META_AD_ACCOUNT_ID: ${META_AD_ACCOUNT_ID:-}
      META_PAGE_ID: ${META_PAGE_ID:-}
      META_ADS_TOKEN: ${META_ADS_TOKEN:-}
    ports:
      - "3001:3001"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount database/data for writing ##u/##p files
      - ./database/data:/app/database/data
      # Shared image storage (backend writes, frontend serves via nginx)
      - ./frontend/images/posts:/app/images/posts
      # LeagueApps API private key for JWT-bearer OAuth (RS256).  Used by
      # LeagueAppsService when fetching program registrations during team
      # reconciliation.  Read-only — same key file the Python sync scripts
      # used to share with the (now-removed) meta-leads-webhook container.
      - ./config:/app/config:ro
    networks:
      - footballhome_network
    depends_on:
      db:
        condition: service_healthy

  # Frontend (Vanilla JS)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: footballhome_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      # Serve all frontend files directly from host — no rebuild needed on changes
      - ./frontend:/usr/share/nginx/html
      - ./frontend/images/posts:/usr/share/nginx/html/images/posts
    networks:
      - footballhome_network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # LeagueApps → leads.converted_at auto-match sidecar.
  #
  # Hourly poll of every configured LeagueApps program ID (boys / girls /
  # mens / membership) — for each active SPOT_RESERVED registrant whose
  # email also lives in our `leads` table as an open lead, we POST
  # `/api/leads/:id/mark-converted` with source='leagueapps'.  Manual
  # signed-up flags always win (the script skips any lead whose
  # converted_at is already non-NULL).
  #
  # The sidecar speaks only to the backend HTTP API — no direct DB
  # access — so it stays cleanly isolated.  Bearer is presence-only
  # today; LEADS_SYNC_BEARER is opaque but kept overridable so we can
  # tighten this later without a code change here.
  leagueapps-sync:
    image: python:3.11-slim
    container_name: footballhome_leagueapps_sync
    restart: unless-stopped
    env_file: ./env
    environment:
      BACKEND_URL: http://backend:3001
      LEADS_SYNC_BEARER: leagueapps-sync
      # Re-run every hour.  Registration export is cheap (one HTTPS call
      # per program) and pause-friendly — bumping this to 5min during
      # a registration push is safe.
      SYNC_INTERVAL_SECONDS: "3600"
    volumes:
      - ./scripts:/app/scripts:ro
      - ./config:/app/config:ro
    working_dir: /app
    command: >
      sh -c "
        pip install --quiet --no-cache-dir requests pyjwt cryptography &&
        echo 'leagueapps-sync ready — interval='$$SYNC_INTERVAL_SECONDS's' &&
        while true; do
          python3 scripts/sync-leagueapps-conversions.py 2>&1 || echo 'sync failed (will retry next cycle)';
          sleep $$SYNC_INTERVAL_SECONDS;
        done
      "
    networks:
      - footballhome_network
    depends_on:
      backend:
        condition: service_started

  # C++ tactical football simulator (M0).
  #
  # Owns one Match, drives a 20 Hz tick loop, and exposes /sim as a
  # WebSocket endpoint (fh-sim.v1 wire protocol, §7 of sim/DESIGN.md).
  # Every client authenticates with a JWT_SECRET-signed token — the
  # SAME shared secret the backend uses — so browser clients only need
  # to hand the sim the token they already have.
  #
  # nginx (frontend container) proxies /sim → footballhome_sim:9100.
  # Never expose 9100 to the host; the browser talks WSS via the
  # frontend's TLS-terminating nginx.
  footballhome_sim:
    build:
      context: ./sim
      dockerfile: Dockerfile
    container_name: footballhome_sim
    restart: unless-stopped
    env_file: ./env
    environment:
      SIM_BIND_ADDRESS: 0.0.0.0
      SIM_PORT: "9100"
      SIM_MATCH_ID: "1"
      SIM_MATCH_SEED: "42"
    networks:
      - footballhome_network
    # No ports: block — the sim is only reachable via nginx on the
    # internal footballhome_network.
    healthcheck:
      # A raw TCP connect to 9100 is enough to prove the process is up
      # and the socket is listening. WebSocket handshake is not exercised
      # here; the backend / frontend do that end-to-end.
      test: ["CMD-SHELL", "ss -Hln --tcp sport = :9100 | grep -q LISTEN"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s



# Named volumes for persistent data
volumes:
  db_data:
    driver: local

# Custom network for service communication
networks:
  footballhome_network:
    driver: bridge
