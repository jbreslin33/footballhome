# Per-developer stack (db + backend + frontend only).
# Used by scripts/dev/dev-up.sh — does NOT replace production compose.
#
# Isolation:
#   COMPOSE_PROJECT_NAME=fhdev_<slug>
#   unique host ports from config/dev-slots.conf
#   own named volume fhdev_<slug>_db_data
#   no sim / podman.sock / leagueapps-sync (keeps prod's sim socket alone)
#
# Required env (exported by scripts/dev/lib-dev-slot.sh):
#   FH_DEV_SLUG, FH_DEV_FRONTEND_PORT, FH_DEV_BACKEND_PORT, FH_DEV_DB_PORT

services:
  db:
    build:
      context: .
      dockerfile: .docker/postgres/Dockerfile
    container_name: footballhome_db_${FH_DEV_SLUG}
    restart: unless-stopped
    environment:
      POSTGRES_DB: footballhome
      POSTGRES_USER: footballhome_user
      POSTGRES_PASSWORD: footballhome_pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      ENVIRONMENT: dev
    ports:
      - "${FH_DEV_DB_PORT}:5432"
    volumes:
      - ./database/data:/app/data:ro,Z
      - fhdev_db_data:/var/lib/postgresql/data
    networks:
      - fhdev_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U footballhome_user -d footballhome"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s
    command: >
      postgres
      -c shared_preload_libraries=pg_cron
      -c cron.database_name=footballhome
      -c log_statement=ddl
      -c log_duration=off
      -c log_min_duration_statement=1000
      -c log_line_prefix='%t [%p] %u@%d '
      -c client_min_messages=notice

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: footballhome_backend_${FH_DEV_SLUG}
    restart: unless-stopped
    env_file: ./env
    environment:
      POSTGRES_PASSWORD: footballhome_pass
      ENVIRONMENT: dev
      # Point OAuth / cookies at this slot's public URL when set.
      FRONTEND_URL: ${FH_DEV_FRONTEND_URL:-http://127.0.0.1:${FH_DEV_FRONTEND_PORT}}
      FH_ENABLE_SIM_DEBUG: "0"
      FH_SIM_ORCHESTRATOR_ENABLED: "0"
    ports:
      - "${FH_DEV_BACKEND_PORT}:3001"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./database/data:/app/database/data
      - ./frontend/images/posts:/app/images/posts
      - ./config:/app/config:ro
    networks:
      - fhdev_network
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: footballhome_frontend_${FH_DEV_SLUG}
    restart: unless-stopped
    ports:
      - "${FH_DEV_FRONTEND_PORT}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./frontend/images/posts:/usr/share/nginx/html/images/posts
    networks:
      - fhdev_network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  fhdev_db_data:
    name: fhdev_${FH_DEV_SLUG}_db_data
    driver: local

networks:
  fhdev_network:
    name: fhdev_${FH_DEV_SLUG}_net
    driver: bridge
