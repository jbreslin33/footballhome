    <!-- ── HARD NO-CACHE POLICY (2026-07-07) ──────────────────────────
         Default behaviour across the entire site is *no caching of any
         kind* for any server response.  Rationale from the project
         owner:
           "the only thing that should be saved is login on user
            browser. not other data"
         Login state = localStorage `token` + `user` (see auth.js).
         Everything else — HTML, JS, CSS, JSON — must be fetched fresh
         on every navigation.  This is enforced at three layers:
           1) Container nginx (frontend/nginx.conf) sends
              `Cache-Control: no-store, no-cache, must-revalidate` for
              every asset it serves.
           2) These `<meta http-equiv>` tags below tell the browser the
              same thing at document level (belt-and-suspenders for
              HTML file:// / offline / bfcache edge cases).
           3) `auth.js` sets `cache: 'no-store'` on every fetch().
         `?v=xxx` version stamps have been removed from every <script>
         and <link>: with `no-store` in effect they served no purpose
         and made dev cycles brittle (edit-without-bumping = stale JS
         for users).  If we ever re-enable caching for a specific
         static asset later, add explicit `Cache-Control: max-age=…`
         to only that asset — NOT globally. -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- ── View-as / impersonation banner (2026-07-11) ────────────────
         Persistent orange bar shown at the very top of every screen
         when an admin has entered "View as..." mode from the
         role-selection screen.  Populated by the tiny IIFE below,
         which listens for `viewAsChanged` events fired by auth.js
         AND runs once on load so refreshes keep the banner visible.
         Clicking "Exit view-as" clears the impersonation and reloads
         the current screen. -->
    <div id="view-as-banner" style="display:none; position:sticky; top:0;
         z-index:9998; background:#f97316; color:white;
         padding:8px 14px; font-weight:600; text-align:center;
         box-shadow:0 2px 8px rgba(0,0,0,0.25);">

      <button id="view-as-banner-exit" style="padding:4px 12px;
              border-radius:6px; border:1px solid rgba(255,255,255,0.5);
              background:rgba(0,0,0,0.15); color:white; font-weight:700;
              cursor:pointer;">
        Exit view-as

    </div>

    <div id="context-header" class="context-header" style="display: none;">

    <!-- ── Freshness guarantee (dev-first, 2026-07-14) ─────────────────
         Owner directive: "footballhome should be efficient enough that
         this does not cost us at least during dev phase" — i.e. burn
         whatever bandwidth is required to guarantee the user is
         ALWAYS on the latest deployed code, no manual hard-reloads.

         This single IIFE does four things, in order:
           1) NUKE on load — proactively unregister every service
              worker and delete every Cache Storage bucket the browser
              owns for this origin.  `sw.js` also self-unregisters,
              but doing it here too covers the case where the browser
              has an old SW registration that never got a chance to
              activate.  Runs on every page load before any app JS.
           2) BASELINE — capture the current `/` `Last-Modified`
              header as the "code version I'm running".
           3) POLL — recheck every 5 s (down from the old 30 s;
              trivial cost, ~1 KB per request, and it means new
              deploys land within seconds instead of half a minute).
              Also recheck instantly on tab-visibility restore.
           4) FORCE-RELOAD API + hotkey — expose `window.forceReload()`
              and a `Ctrl+Alt+R` (or `Cmd+Alt+R` on Mac) keyboard
              shortcut that nukes SW/cache/storage AND reloads.  Use
              this from the console when you want to *know* the tab
              is on the newest code, no questions asked.

         Loaded BEFORE the rest of the app scripts so the cleanup +
         reload wiring is live even if a bug in the newest code would
         otherwise break the page and strand the user. -->
    <script>
      (function () {
        // ── 1) NUKE on every page load ───────────────────────────
        function nukeCaches() {
          var promises = [];
          if ('serviceWorker' in navigator) {
            promises.push(
              navigator.serviceWorker.getRegistrations()
                .then(function (regs) {
                  return Promise.all(regs.map(function (r) {
                    console.log('[freshness] unregistering SW ' + r.scope);
                    return r.unregister().catch(function () {});
                  }));
                })
                .catch(function () {})
            );
          }
          if (typeof caches !== 'undefined' && caches.keys) {
            promises.push(
              caches.keys()
                .then(function (names) {
                  return Promise.all(names.map(function (n) {
                    console.log('[freshness] deleting cache ' + n);
                    return caches.delete(n).catch(function () {});
                  }));
                })
                .catch(function () {})
            );
          }
          return Promise.all(promises);
        }
        nukeCaches();

        // ── 2/3) Baseline + poll for new deploys ─────────────────
        var baseline = null;
        function poll() {
          fetch('/', { method: 'HEAD', cache: 'no-store' })
            .then(function (r) {
              var lm = r.headers.get('Last-Modified');
              if (!lm) return;
              if (baseline === null) { baseline = lm; return; }
              if (lm !== baseline) {
                console.log('[auto-reload] new deploy detected (' + baseline + ' → ' + lm + '), reloading');
                location.reload();
              }
            })
            .catch(function () { /* offline; try again next tick */ });
        }
        poll();                         // capture baseline
        setInterval(poll, 5000);        // recheck every 5 s (dev-first)
        document.addEventListener('visibilitychange', function () {
          if (!document.hidden) poll(); // instant recheck when tab regains focus
        });

        // ── 4) Force-reload API + keyboard shortcut ──────────────
        // window.forceReload() — call from console to hard-reset:
        //   * unregister every service worker
        //   * delete every cache bucket
        //   * reload with a fresh URL to defeat bfcache
        window.forceReload = function () {
          console.log('[force-reload] nuking everything…');
          nukeCaches().finally(function () {
            // Add a cache-buster query so bfcache can't restore an
            // old snapshot.  `location.reload(true)` is deprecated;
            // this is the modern equivalent.
            var u = new URL(window.location.href);
            u.searchParams.set('_r', Date.now());
            window.location.replace(u.toString());
          });
        };
        window.addEventListener('keydown', function (e) {
          // Ctrl+Alt+R (or Cmd+Alt+R on Mac) — hard force-reload.
          // Ctrl+Shift+R is already the browser's own hard-refresh
          // and we don't want to conflict with it.
          if ((e.ctrlKey || e.metaKey) && e.altKey && (e.key === 'r' || e.key === 'R')) {
            e.preventDefault();
            window.forceReload();
          }
        });
      })();
    </script>

    <!-- ── View-as banner controller (2026-07-11) ─────────────────────
         Bridges auth.js's `viewAsChanged` event to the banner DOM
         element added above.  Also renders once on load so a page
         refresh mid-impersonation still shows the reminder.  Kept
         inline (not in auth.js) so the banner is available before
         the rest of the JS bundle parses. -->
    <script>
      (function () {
        function readViewAs() {
          try {
            var id   = localStorage.getItem('viewAsPersonId');
            var name = localStorage.getItem('viewAsPersonName') || '';
            return id ? { personId: Number(id), personName: name } : null;
          } catch (_e) { return null; }
        }
        function render() {
          var el   = document.getElementById('view-as-banner');
          var name = document.getElementById('view-as-banner-name');
          if (!el || !name) return;
          var va = readViewAs();
          if (va && va.personId) {
            name.textContent = 'Viewing as ' + (va.personName || ('#' + va.personId));
            el.style.display = 'block';
          } else {
            el.style.display = 'none';
          }
        }
        window.addEventListener('viewAsChanged', render);
        // Click handler wired in DOMContentLoaded so window.app is up.
        document.addEventListener('DOMContentLoaded', function () {
          render();
          var exitBtn = document.getElementById('view-as-banner-exit');
          if (exitBtn) {
            exitBtn.addEventListener('click', function () {
              try {
                if (window.app && window.app.auth) {
                  window.app.auth.clearViewAs();
                }
              } catch (_e) {
                localStorage.removeItem('viewAsPersonId');
                localStorage.removeItem('viewAsPersonName');
                render();
              }
              // Force the current screen to re-fetch without the ?asPersonId= param.
              // Cheapest reliable path: full reload.
              location.reload();
            });
          }
        });
      })();
    </script>

    <!-- ── Service worker cleanup (2026-07-07) ─────────────────────────
         PWA install-prompt SW disabled per project owner directive
         ("get rid of all cache").  This block runs on EVERY page load
         and forces cleanup of any lingering SW:
           1) getRegistrations() finds every SW registered for this
              origin (there should be 0-1).
           2) For each: call .update() first.  This bypasses the
              browser's default 24 h SW-update cache and forces an
              immediate byte-comparison against /sw.js on the server.
              If sw.js changed, the new one installs → activates →
              runs its own cleanup handler → unregisters itself.
           3) Then call .unregister() as a belt-and-suspenders in case
              step 2 didn't finish.
           4) Delete every Cache Storage bucket regardless.
         Note: localStorage is a *different* API and is NEVER touched
         by any of this.  The user's login (`token` + `user` keys in
         localStorage, set by auth.js) survives all of it.
         When we re-introduce PWA install, revert this block to a
         `navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })`
         call — `updateViaCache: 'none'` is important: it tells the
         browser to never cache /sw.js in HTTP cache, so future
         updates always propagate on the next navigation. -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) {
            // Force byte-check against server's /sw.js NOW (don't
            // wait 24 h for the browser's default check).  If sw.js
            // has changed, this triggers install→activate→cleanup.
            try { r.update(); } catch (_) {}
            // Then unregister regardless — we don't want any SW.
            r.unregister().catch(function () {});
          });
        }).catch(function () {});
      }
      if (window.caches && caches.keys) {
        caches.keys().then(function (names) {
          names.forEach(function (n) { caches.delete(n).catch(function () {}); });
        }).catch(function () {});
      }
    </script>
