    <!-- ── HARD NO-CACHE POLICY (2026-07-07) ──────────────────────────
         Default behaviour across the entire site is *no caching of any
         kind* for any server response.  Rationale from the project
         owner:
           "the only thing that should be saved is login on user
            browser. not other data"
         Login state = localStorage `token` + `user` (see auth.js).
         Everything else — HTML, JS, CSS, JSON — must be fetched fresh
         on every navigation.  This is enforced at three layers:
           1) Container nginx (frontend/nginx.conf) sends
              `Cache-Control: no-store, no-cache, must-revalidate` for
              every asset it serves.
           2) These `<meta http-equiv>` tags below tell the browser the
              same thing at document level (belt-and-suspenders for
              HTML file:// / offline / bfcache edge cases).
           3) `auth.js` sets `cache: 'no-store'` on every fetch().
         `?v=xxx` version stamps have been removed from every <script>
         and <link>: with `no-store` in effect they served no purpose
         and made dev cycles brittle (edit-without-bumping = stale JS
         for users).  If we ever re-enable caching for a specific
         static asset later, add explicit `Cache-Control: max-age=…`
         to only that asset — NOT globally. -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- ── Service worker cleanup (2026-07-07) ─────────────────────────
         PWA install-prompt SW disabled per project owner directive
         ("get rid of all cache").  Any browser that installed a
         previous SW (2026-07-03a or earlier) still has it registered
         and can serve stale-ish responses via bfcache /
         cache-storage.  This block actively unregisters every SW and
         deletes every Cache Storage bucket the first time a user
         opens the page after this deploy.  Once unregistered the
         browser goes back to a plain network path.
         When we re-introduce PWA install, revert this block to the
         previous `navigator.serviceWorker.register('/sw.js')` call
         AFTER re-adding a proper `sw.js` — and make sure the new SW
         does not implement `cache.put()` unless the user opts in. -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((regs) => {
          regs.forEach((r) => r.unregister().catch(() => {}));
        }).catch(() => {});
      }
      if (window.caches && caches.keys) {
        caches.keys().then((names) => {
          names.forEach((n) => caches.delete(n).catch(() => {}));
        }).catch(() => {});
      }
    </script>
