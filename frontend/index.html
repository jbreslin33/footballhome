    <!-- ── HARD NO-CACHE POLICY (2026-07-07) ──────────────────────────
         Default behaviour across the entire site is *no caching of any
         kind* for any server response.  Rationale from the project
         owner:
           "the only thing that should be saved is login on user
            browser. not other data"
         Login state = localStorage `token` + `user` (see auth.js).
         Everything else — HTML, JS, CSS, JSON — must be fetched fresh
         on every navigation.  This is enforced at three layers:
           1) Container nginx (frontend/nginx.conf) sends
              `Cache-Control: no-store, no-cache, must-revalidate` for
              every asset it serves.
           2) These `<meta http-equiv>` tags below tell the browser the
              same thing at document level (belt-and-suspenders for
              HTML file:// / offline / bfcache edge cases).
           3) `auth.js` sets `cache: 'no-store'` on every fetch().
         `?v=xxx` version stamps have been removed from every <script>
         and <link>: with `no-store` in effect they served no purpose
         and made dev cycles brittle (edit-without-bumping = stale JS
         for users).  If we ever re-enable caching for a specific
         static asset later, add explicit `Cache-Control: max-age=…`
         to only that asset — NOT globally. -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- ── Auto-reload on new deploy (2026-07-07) ──────────────────────
         Server-driven page refresh.  On every deploy, nginx serves
         `index.html` with a fresh `Last-Modified` header (auto-derived
         from the file's mtime on the bind-mount host).  This IIFE:
           1) Captures the Last-Modified of `/` on page load as the
              baseline.
           2) Polls HEAD / every 30 s (also on tab-visibility change).
           3) If the returned Last-Modified differs from the baseline,
              calls `location.reload()`.
         Result: within ~30 s of any deploy, every open tab reloads
         itself — no manual hard-reload, no "did I clear cache?" ever
         again.  Cost: one tiny HEAD request per tab per 30 s.
         Loaded BEFORE the rest of the app so the reload can happen
         even if a bug in the newest code would otherwise break the
         page and strand the user on the last-good version. -->
    <script>
      (function () {
        var baseline = null;
        function poll() {
          fetch('/', { method: 'HEAD', cache: 'no-store' })
            .then(function (r) {
              var lm = r.headers.get('Last-Modified');
              if (!lm) return;
              if (baseline === null) { baseline = lm; return; }
              if (lm !== baseline) {
                console.log('[auto-reload] new deploy detected (' + baseline + ' → ' + lm + '), reloading');
                location.reload();
              }
            })
            .catch(function () { /* offline; try again next tick */ });
        }
        poll();                          // capture baseline
        setInterval(poll, 30000);        // recheck every 30 s
        document.addEventListener('visibilitychange', function () {
          if (!document.hidden) poll();  // instant recheck when tab regains focus
        });
      })();
    </script>

    <!-- ── Service worker cleanup (2026-07-07) ─────────────────────────
         PWA install-prompt SW disabled per project owner directive
         ("get rid of all cache").  This block runs on EVERY page load
         and forces cleanup of any lingering SW:
           1) getRegistrations() finds every SW registered for this
              origin (there should be 0-1).
           2) For each: call .update() first.  This bypasses the
              browser's default 24 h SW-update cache and forces an
              immediate byte-comparison against /sw.js on the server.
              If sw.js changed, the new one installs → activates →
              runs its own cleanup handler → unregisters itself.
           3) Then call .unregister() as a belt-and-suspenders in case
              step 2 didn't finish.
           4) Delete every Cache Storage bucket regardless.
         Note: localStorage is a *different* API and is NEVER touched
         by any of this.  The user's login (`token` + `user` keys in
         localStorage, set by auth.js) survives all of it.
         When we re-introduce PWA install, revert this block to a
         `navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })`
         call — `updateViaCache: 'none'` is important: it tells the
         browser to never cache /sw.js in HTTP cache, so future
         updates always propagate on the next navigation. -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) {
            // Force byte-check against server's /sw.js NOW (don't
            // wait 24 h for the browser's default check).  If sw.js
            // has changed, this triggers install→activate→cleanup.
            try { r.update(); } catch (_) {}
            // Then unregister regardless — we don't want any SW.
            r.unregister().catch(function () {});
          });
        }).catch(function () {});
      }
      if (window.caches && caches.keys) {
        caches.keys().then(function (names) {
          names.forEach(function (n) { caches.delete(n).catch(function () {}); });
        }).catch(function () {});
      }
    </script>
