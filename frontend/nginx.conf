server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Default: no caching on everything
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    etag off;
    if_modified_since off;

    # Meta lead gen webhook — now served by the C++ backend
    # (LeadsWebhookController, Phase 14).  Rides the /api/-style catch-all
    # below but needs its own block because it doesn't live under /api/.
    location /webhook/meta-leads {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Youth roster (Phase 7) is C++ as of YouthRosterController —
    # rides the /api/ catch-all to the backend below.  No carve-out needed.

    # Mens roster (Phase 8) is C++ as of MensRosterController — covers
    # GET /api/mens-roster, POST /api/mens-roster/assign, and
    # POST /api/mens-roster/roster-status.  Rides the /api/ catch-all.

    # NOTE: GET /api/teams/:teamId/reconciliation is C++ as of Phase 3b
    # (HttpClient + JwtRS256 + LeagueAppsService +
    # PersonLinker + TeamReconciliation).  It rides the /api/ catch-all
    # to the backend below — no carve-out needed.

    # LA Players Pool (Phase 6) is C++ as of ClubLaPoolController — rides
    # the /api/ catch-all to the backend below.  No carve-out needed.

    # Persons API — fully served by C++ backend as of Phase 2b of the
    # (now-completed) Node → C++ migration.  Rides the /api/ catch-all
    # below; the explicit block exists only to document the boundary.
    location /api/persons {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # API proxy to backend
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
        proxy_read_timeout 300s;
    }

    # /sim — WebSocket endpoint for the LEGACY M0 sim daemon
    # (docker-compose service `footballhome_sim`, hardcoded
    # SIM_MATCH_ID=1 in its env). Kept for backwards compat with the
    # M0 fallback path in SimLobbyController::handleCreateMatch —
    # served whenever the orchestrator feature flag is off, or when a
    # caller connects to the pre-seeded match_id=1.
    #
    # The browser opens a WSS connection here (fh-sim.v1 wire, see
    # sim/DESIGN.md §7). nginx upgrades the connection and proxies it
    # straight through to the sim container on port 9100. JWT auth
    # travels inside the Sec-WebSocket-Protocol header
    # (`fh-sim.v1.bearer.<JWT>`); nginx is *not* aware of it.
    #
    # `location = /sim` is EXACT — a prefix match would swallow
    # `/sim.html`, `/sim-anything`, etc. and try to WS-proxy them too.
    # The regex block below handles multi-match `/sim/<id>` routing.
    # No caching, no buffering — this is a persistent bidirectional
    # binary stream, not a request/response.
    location = /sim {
        proxy_pass http://footballhome_sim:9100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket subprotocol header must be forwarded verbatim — it
        # carries the JWT the sim needs for authentication.
        proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;

        # Long-lived stream — 20 Hz snapshots trickle indefinitely.
        proxy_read_timeout  1h;
        proxy_send_timeout  1h;

        # Disable response buffering so snapshot frames reach the
        # browser with minimum latency.
        proxy_buffering off;
    }

    # /sim/<match_id> — WebSocket endpoint for orchestrator-launched
    # per-match sim daemons (Slice 14.3 introduced SimOrchestrator, this
    # block is Slice 14.4). Container names follow the deterministic
    # pattern `footballhome_sim_<match_id>` (see
    # backend/src/models/SimRunningMatch.h — SINGLE source of truth).
    #
    # Regex captures the numeric match_id; `set $sim_upstream` builds
    # the target hostname; `proxy_pass http://$sim_upstream:9100` uses
    # the variable form which forces nginx to resolve the hostname at
    # REQUEST time (not startup) — required because per-match daemons
    # come and go dynamically.
    #
    # The `resolver` directive points at podman's built-in aardvark-dns
    # (10.89.0.1 on this host — matches /etc/resolv.conf inside the
    # container). `valid=5s` matches the rapid-spawn cadence: if a
    # match is created and immediately joined the DNS record must be
    # fresh, but we don't want to hammer the resolver either. `ipv6=off`
    # avoids AAAA lookups nginx would silently ignore — aardvark-dns
    # only serves A records on the default bridge.
    #
    # If the target container doesn't exist (bad match_id, or the
    # daemon is still booting) nginx returns 502 Bad Gateway — the
    # client surfaces this in the sim-status HUD.
    #
    # NOTE: this regex is deliberately anchored with $ so `/sim/foo`,
    # `/sim/1/extra`, `/sim/1?x=1` (query string arrives separately),
    # etc. all fall through to whatever else matches. Only bare
    # `/sim/<digits>` connects here.
    resolver 10.89.0.1 valid=5s ipv6=off;
    location ~ ^/sim/(\d+)$ {
        set $sim_upstream footballhome_sim_$1;
        proxy_pass http://$sim_upstream:9100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;

        proxy_read_timeout  1h;
        proxy_send_timeout  1h;

        proxy_buffering off;
    }

    # Instagram post images
    location ^~ /images/posts/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # PWA manifest — force correct MIME type + no-cache like everything else.
    location = /manifest.json {
        default_type application/manifest+json;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # PWA service worker — must be served from the site root with
    # no-cache so updates roll out immediately.
    location = /sw.js {
        default_type application/javascript;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
    }

    # /pickup — public guest funnel (standalone landing, NOT the SPA).
    # Meta ad CTAs point here so unauthenticated ad traffic lands on a
    # dedicated form that POSTs to /api/leads/guest-signup.  Both /pickup
    # and /pickup.html serve the same static file so we don't care which
    # variant the copy uses.
    location = /pickup {
        default_type text/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /pickup.html =404;
    }
    location = /pickup/ {
        return 301 /pickup;
    }

    # /reset-password — public password-reset landing (standalone, NOT
    # the SPA).  Emailed reset links point here with a ?token=... query
    # string; the page POSTs the raw token + new password to
    # /api/auth/reset-password.
    location = /reset-password {
        default_type text/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /reset-password.html =404;
    }
    location = /reset-password/ {
        return 301 /reset-password;
    }

    # Client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}