server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Default: no caching on everything
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    etag off;
    if_modified_since off;

    # Meta lead gen webhook (proxied to Node service)
    location /webhook/meta-leads {
        proxy_pass http://meta-leads-webhook:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Ads preview + spend APIs (proxied to Node webhook service)
    location /api/ads/ {
        proxy_pass http://meta-leads-webhook:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Leads API (proxied to Node service — more specific than /api/)
    location /api/leads {
        proxy_pass http://meta-leads-webhook:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Youth Roster API (live LeagueApps read — more specific than /api/)
    location /api/youth-roster {
        proxy_pass http://meta-leads-webhook:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Mens Roster API (live LeagueApps + assignment writes)
    location /api/mens-roster {
        proxy_pass http://meta-leads-webhook:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # NOTE: GET /api/teams/:teamId/reconciliation is C++ as of Phase 3b
    # (HttpClient + JwtRS256 + GroupMeService + LeagueAppsService +
    # PersonLinker + TeamReconciliation).  It rides the /api/ catch-all
    # to the backend below — no carve-out needed.

    # LA Players Pool — leftmost column on /lineups.  Lives on Node since
    # it talks to LeagueApps' private API for mens-program registrations.
    location ~ ^/api/clubs/[0-9]+/la-pool$ {
        proxy_pass http://meta-leads-webhook:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Persons API — fully served by C++ backend as of Phase 2b of the
    # meta-leads-webhook → C++ migration.  Covers overrides (GET/POST/DELETE),
    # merge, unmerge, and the per-person merges list.
    location /api/persons {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # API proxy to backend
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
        proxy_read_timeout 300s;
    }

    # Instagram post images
    location ^~ /images/posts/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}