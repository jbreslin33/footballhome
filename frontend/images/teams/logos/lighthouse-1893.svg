<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="96" fill="#1a365d" stroke="#f59e0b" stroke-width="4"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Lighthouse -->
  <rect x="90" y="50" width="20" height="60" fill="#fff" rx="2"/>
  <rect x="85" y="105" width="30" height="8" fill="#fff" rx="1"/>
  <rect x="80" y="113" width="40" height="5" fill="#f59e0b"/>
  <!-- Light rays -->
  <polygon points="100,42 92,50 108,50" fill="#f59e0b"/>
  <circle cx="100" cy="44" r="6" fill="#f59e0b"/>
  <line x1="100" y1="38" x2="100" y2="28" stroke="#f59e0b" stroke-width="2"/>
  <line x1="90" y1="40" x2="82" y2="32" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="110" y1="40" x2="118" y2="32" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Waves -->
  <path d="M60,125 Q70,120 80,125 Q90,130 100,125 Q110,120 120,125 Q130,130 140,125" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Text -->
  <text x="100" y="148" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="11" font-weight="700" letter-spacing="1">LIGHTHOUSE</text>
  <text x="100" y="164" text-anchor="middle" fill="#f59e0b" font-family="Arial,sans-serif" font-size="14" font-weight="800">1893 SC</text>
  <text x="100" y="180" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Arial,sans-serif" font-size="8" letter-spacing="2">PHILADELPHIA</text>
</svg>
