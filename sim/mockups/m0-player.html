<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0e1a12">
<title>fh sim · M0 player mockup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0e1a12; color: #e6efe8; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 14px; }
  body { display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; display: block; }

  /* HUD top bar */
  #hud-top { position: absolute; top: env(safe-area-inset-top, 0); left: env(safe-area-inset-left, 0); right: env(safe-area-inset-right, 0); display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 14px; pointer-events: none; z-index: 5; }
  #hud-top .box { background: rgba(14,26,18,0.72); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 6px 10px; backdrop-filter: blur(4px); pointer-events: auto; }
  #match-clock { font-variant-numeric: tabular-nums; font-weight: 600; font-size: 15px; letter-spacing: 0.5px; }
  #match-info { font-size: 11px; opacity: 0.7; margin-top: 2px; }
  #input-mode { font-size: 10px; letter-spacing: 1px; opacity: 0.55; text-transform: uppercase; }
  #you-info { text-align: right; }
  #you-name { font-weight: 600; font-size: 13px; }
  #you-motion { font-size: 11px; opacity: 0.75; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Stamina bar (bottom, above joystick area on mobile; bottom-right on desktop) */
  #stamina-wrap { position: absolute; z-index: 4; pointer-events: none; }
  #stamina-wrap .label { font-size: 10px; letter-spacing: 1px; opacity: 0.6; text-transform: uppercase; margin-bottom: 4px; }
  #stamina-bar { width: 180px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
  #stamina-fill { height: 100%; background: linear-gradient(90deg, #6bd88a, #4bb46a); transition: width 0.15s linear; }
  #stamina-fill.low { background: linear-gradient(90deg, #d88a4b, #c56a2a); }
  #stamina-fill.empty { background: linear-gradient(90deg, #d84b4b, #a02020); }

  /* Roster panel — desktop only */
  #roster { position: absolute; top: 60px; right: 14px; width: 200px; background: rgba(14,26,18,0.72); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px 12px; backdrop-filter: blur(4px); z-index: 3; display: none; }
  #roster h3 { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.55; margin-bottom: 8px; }
  #roster ul { list-style: none; }
  #roster li { display: flex; align-items: center; padding: 3px 0; font-size: 12px; }
  #roster .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
  #roster .you-marker { margin-left: auto; font-size: 9px; opacity: 0.6; letter-spacing: 1px; }

  /* Joystick — mobile only */
  #joystick { position: absolute; left: calc(24px + env(safe-area-inset-left, 0)); bottom: calc(24px + env(safe-area-inset-bottom, 0)); width: 140px; height: 140px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15); z-index: 6; display: none; touch-action: none; }
  #joystick.active { background: rgba(255,255,255,0.14); }
  #stick { position: absolute; left: 50%; top: 50%; width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.55); border: 2px solid rgba(255,255,255,0.85); transform: translate(-50%, -50%); transition: background 0.1s; }
  #stick.sprint { background: rgba(255,90,60,0.75); border-color: rgba(255,140,120,0.95); }

  /* Sprint button — mobile, bottom-right */
  #sprint-btn { position: absolute; right: calc(24px + env(safe-area-inset-right, 0)); bottom: calc(24px + env(safe-area-inset-bottom, 0)); width: 88px; height: 88px; border-radius: 50%; background: rgba(255,90,60,0.18); border: 2px solid rgba(255,90,60,0.4); z-index: 6; display: none; align-items: center; justify-content: center; font-size: 11px; letter-spacing: 2px; font-weight: 700; color: rgba(255,180,160,0.9); touch-action: none; }
  #sprint-btn.active { background: rgba(255,90,60,0.5); border-color: rgba(255,140,120,0.9); color: #fff; }

  /* Keyboard hint — desktop only */
  #kb-hint { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); background: rgba(14,26,18,0.72); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 8px 14px; font-size: 11px; letter-spacing: 0.5px; opacity: 0.75; backdrop-filter: blur(4px); z-index: 3; display: none; }
  #kb-hint kbd { display: inline-block; background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.2); border-radius: 3px; padding: 1px 6px; margin: 0 2px; font-family: ui-monospace, monospace; font-size: 10px; }

  /* Media queries */
  @media (pointer: coarse), (max-width: 800px) {
    #joystick, #sprint-btn { display: block; }
    #stamina-wrap { left: calc(24px + env(safe-area-inset-left, 0)); bottom: calc(180px + env(safe-area-inset-bottom, 0)); }
  }
  @media (pointer: fine) and (min-width: 801px) {
    #kb-hint, #roster { display: block; }
    #stamina-wrap { right: 14px; bottom: 16px; }
  }
  /* landscape mobile: joystick + button stay put, stamina moves right of joystick */
  @media (pointer: coarse) and (orientation: landscape) {
    #stamina-wrap { left: 180px; bottom: calc(24px + env(safe-area-inset-bottom, 0)); }
  }
</style>
</head>
<body>
  <canvas id="pitch"></canvas>

  <div id="hud-top">
    <div>
      <div class="box">
        <div id="match-clock">00:00</div>
        <div id="match-info">empty_pitch · seed 424242</div>
      </div>
      <div id="input-mode" style="margin-top:8px;padding-left:4px;">— input —</div>
    </div>
    <div class="box" id="you-info">
      <div id="you-name">YOU · slot 1</div>
      <div id="you-motion">IDLE</div>
    </div>
  </div>

  <div id="roster">
    <h3>Roster · 8 slots</h3>
    <ul id="roster-list"></ul>
  </div>

  <div id="stamina-wrap">
    <div class="label">Stamina</div>
    <div id="stamina-bar"><div id="stamina-fill" style="width:100%"></div></div>
  </div>

  <div id="joystick"><div id="stick"></div></div>
  <div id="sprint-btn">SPRINT</div>
  <div id="kb-hint"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move · <kbd>Shift</kbd> sprint · <kbd>Ctrl</kbd> walk</div>

<script>
'use strict';

/* ================================================================
 * fh sim · M0 player mockup
 * Standalone: no build tools, no deps, no network.
 * Mirrors design doc §5, §7, §16.
 *
 * Simulated pieces (client-only for this mockup):
 *   - 20 Hz "server" tick (setInterval 50ms) producing snapshots
 *   - 60 FPS render loop w/ 2-snapshot interpolation
 *   - Wander AI for the 7 bot slots
 *   - Fixed-step physics; all M0 attributes from §16.2
 *   - Touch + keyboard both first-class (per §6.3)
 * ================================================================ */

// ---- Constants ---------------------------------------------------
const PITCH_L = 105;   // meters (x span: -52.5 to +52.5)
const PITCH_W = 68;    // meters (y span: -34 to +34)
const HALF_L = PITCH_L / 2;
const HALF_W = PITCH_W / 2;

const TICK_HZ = 20;
const TICK_MS = 1000 / TICK_HZ;
const DT = 1 / TICK_HZ;

// M0 attribute defaults from §16.2
const WALK  = 2.0;
const JOG   = 4.5;
const SPRINT= 7.5;
const ACCEL = 6.0;
const DECEL = 8.0;
const AGILITY = 6.0;             // rad/s heading turn cap
const STAM_MAX = 1.0;
const STAM_DRAIN = 0.10;
const STAM_RECOVER = 0.05;

const N_SLOTS = 8;               // mockup uses 8 (design allows up to 12)
const YOUR_SLOT = 0;

// Team palette
const TEAMS = [
  { name: "Orange", color: "#ff8548", ring: "#ffcfb0" },
  { name: "Blue",   color: "#4dabf7", ring: "#c0e0ff" },
];

const BOT_NAMES = ["Ainsley","Nico","Diego","Maya","Kofi","Sofia","Ren","Luca","Emma","Zola","Rio"];

// Motion state labels
const MOTION_LABEL = ["IDLE","WALK","JOG","SPRINT"];

// ---- Entity model ------------------------------------------------
class Entity {
  constructor(id, team, name, x, y) {
    this.id = id;
    this.team = team;
    this.name = name;
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.heading = 0;
    this.motion = 0;
    this.stamina = STAM_MAX;
    // Intent
    this.iDx = 0; this.iDy = 0;
    this.iSprint = false;
    this.iWalk   = false;
    // AI wander state
    this.wanderTarget = null;
    this.wanderNextRoll = 0;
  }
}

// ---- World -------------------------------------------------------
const entities = [];
let tickNum = 0;
let matchStartMs = performance.now();

function spawn() {
  // Slot 0 = you (Orange, near center-left)
  entities.push(new Entity(0, 0, "YOU", -8, 0));
  // 3 more Orange, 4 Blue, roughly stagger positions
  const spawnPos = [
    [-30, -12], [-25, 15], [-15, -18],   // Orange
    [10, -14], [18, 12], [28, -6], [32, 16],  // Blue
  ];
  for (let i = 1; i < N_SLOTS; i++) {
    const team = i <= 3 ? 0 : 1;
    const nm = BOT_NAMES[i - 1];
    const [px, py] = spawnPos[i - 1];
    entities.push(new Entity(i, team, nm, px, py));
  }
}

// ---- Wander AI (M0's only "behavior": run_to_point) --------------
function wanderTick(e, tickTime) {
  if (!e.wanderTarget || tickTime >= e.wanderNextRoll) {
    // pick a new pitch point, roughly around current side
    const tx = (Math.random() * PITCH_L) - HALF_L;
    const ty = (Math.random() * PITCH_W) - HALF_W;
    e.wanderTarget = { x: tx, y: ty };
    e.wanderNextRoll = tickTime + 6 + Math.random() * 10; // seconds until forced re-roll
  }
  const dx = e.wanderTarget.x - e.x;
  const dy = e.wanderTarget.y - e.y;
  const d = Math.hypot(dx, dy);
  if (d < 1.5) {
    e.wanderTarget = null; // arrived, will re-roll next tick
    e.iDx = 0; e.iDy = 0;
    e.iSprint = false; e.iWalk = false;
    return;
  }
  e.iDx = dx / d;
  e.iDy = dy / d;
  e.iSprint = false;
  e.iWalk = false; // default jog
}

// ---- Physics step (mirrors what StubPhysics + mechanics will do) --
function stepEntity(e) {
  // Target speed from intent
  const iMag = Math.hypot(e.iDx, e.iDy);
  let targetSpeed = 0;
  if (iMag > 0.05) {
    if (e.iSprint && e.stamina > 0) targetSpeed = SPRINT;
    else if (e.iWalk)               targetSpeed = WALK;
    else                            targetSpeed = JOG;
  }

  // Heading — turn toward intent, capped by agility
  if (iMag > 0.05) {
    const desiredHeading = Math.atan2(e.iDy, e.iDx);
    let dh = desiredHeading - e.heading;
    while (dh >  Math.PI) dh -= 2 * Math.PI;
    while (dh < -Math.PI) dh += 2 * Math.PI;
    const maxTurn = AGILITY * DT;
    if (Math.abs(dh) > maxTurn) dh = Math.sign(dh) * maxTurn;
    e.heading += dh;
  }

  // Accelerate/decelerate current velocity magnitude toward targetSpeed
  const curSpeed = Math.hypot(e.vx, e.vy);
  let newSpeed = curSpeed;
  if (targetSpeed > curSpeed) newSpeed = Math.min(targetSpeed, curSpeed + ACCEL * DT);
  else                        newSpeed = Math.max(targetSpeed, curSpeed - DECEL * DT);

  // Velocity vector points along heading
  e.vx = Math.cos(e.heading) * newSpeed;
  e.vy = Math.sin(e.heading) * newSpeed;

  // Integrate position
  e.x += e.vx * DT;
  e.y += e.vy * DT;

  // Clamp to pitch bounds (M0: empty pitch, no playable-area soft wall)
  if (e.x >  HALF_L) e.x =  HALF_L;
  if (e.x < -HALF_L) e.x = -HALF_L;
  if (e.y >  HALF_W) e.y =  HALF_W;
  if (e.y < -HALF_W) e.y = -HALF_W;

  // Motion state
  if      (newSpeed < 0.2)                       e.motion = 0;
  else if (newSpeed < (WALK + JOG) / 2)          e.motion = 1;
  else if (newSpeed < (JOG + SPRINT) / 2)        e.motion = 2;
  else                                           e.motion = 3;

  // Stamina
  if (e.motion === 3) e.stamina = Math.max(0, e.stamina - STAM_DRAIN * DT);
  else if (e.motion <= 1) e.stamina = Math.min(STAM_MAX, e.stamina + STAM_RECOVER * DT);
}

// ---- Snapshot buffer (server → client, interpolated by render) ---
const snapshots = []; // { tick, t, ents: [{x,y,vx,vy,heading,motion}, ...] }
const SNAP_BUFFER = 4;

function captureSnapshot() {
  const snap = {
    tick: tickNum,
    t: performance.now(),
    ents: entities.map(e => ({
      x: e.x, y: e.y,
      vx: e.vx, vy: e.vy,
      heading: e.heading,
      motion: e.motion,
    })),
  };
  snapshots.push(snap);
  if (snapshots.length > SNAP_BUFFER) snapshots.shift();
}

// ---- Server tick loop --------------------------------------------
function serverTick() {
  const tickTime = tickNum * DT;
  for (const e of entities) {
    if (e.id === YOUR_SLOT) {
      // your intent is already set from input polling
    } else {
      wanderTick(e, tickTime);
    }
    stepEntity(e);
  }
  captureSnapshot();
  tickNum++;
}
setInterval(serverTick, TICK_MS);
captureSnapshot(); // one at t=0 so renderer has something

// ---- Input: touch joystick ---------------------------------------
const joystick = document.getElementById('joystick');
const stick    = document.getElementById('stick');
const sprintBtn= document.getElementById('sprint-btn');
let touchIntent = { dx: 0, dy: 0, mag: 0, sprint: false, walk: false };
let joystickActivePointer = null;

function updateJoystickVisual(dx, dy, mag) {
  const maxOffset = 42;
  const clamped = Math.min(mag, 1);
  stick.style.left = (50 + dx * clamped * (maxOffset / 70) * 100) + '%';
  stick.style.top  = (50 + dy * clamped * (maxOffset / 70) * 100) + '%';
  if (touchIntent.sprint) stick.classList.add('sprint'); else stick.classList.remove('sprint');
}
function resetJoystickVisual() {
  stick.style.left = '50%'; stick.style.top = '50%';
  stick.classList.remove('sprint');
  joystick.classList.remove('active');
}

joystick.addEventListener('pointerdown', (e) => {
  joystickActivePointer = e.pointerId;
  joystick.setPointerCapture(e.pointerId);
  joystick.classList.add('active');
  handleJoystickMove(e);
  markInputMode('touch');
});
joystick.addEventListener('pointermove', handleJoystickMove);
joystick.addEventListener('pointerup', endJoystick);
joystick.addEventListener('pointercancel', endJoystick);

function handleJoystickMove(e) {
  if (joystickActivePointer !== null && e.pointerId !== joystickActivePointer) return;
  const rect = joystick.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  let dx = (e.clientX - cx);
  let dy = (e.clientY - cy);
  const r = rect.width / 2;
  let mag = Math.hypot(dx, dy) / r;
  if (mag > 1) mag = 1;
  const nDx = mag > 0 ? dx / (r * Math.max(mag, 0.001)) : 0;
  const nDy = mag > 0 ? dy / (r * Math.max(mag, 0.001)) : 0;

  const DEAD = 0.18;
  if (mag < DEAD) {
    touchIntent = { dx: 0, dy: 0, mag: 0, sprint: false, walk: touchIntent.walk };
  } else {
    // magnitude → walk/jog/sprint threshold
    // 0.18–0.55 walk, 0.55–0.85 jog, 0.85+ sprint (sprint also via button)
    const wantsWalk   = mag < 0.55;
    const wantsSprint = mag > 0.85 || touchIntent.sprint;
    touchIntent = { dx: nDx, dy: nDy, mag, sprint: wantsSprint, walk: wantsWalk && !wantsSprint };
  }
  updateJoystickVisual(nDx, nDy, mag);
}
function endJoystick(e) {
  if (joystickActivePointer !== null && e.pointerId !== joystickActivePointer) return;
  joystickActivePointer = null;
  touchIntent = { dx: 0, dy: 0, mag: 0, sprint: touchIntent.sprint, walk: false };
  resetJoystickVisual();
}

// Sprint button (mobile) — hold to force sprint if joystick engaged
sprintBtn.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  sprintBtn.setPointerCapture(e.pointerId);
  sprintBtn.classList.add('active');
  touchIntent.sprint = true;
  markInputMode('touch');
});
sprintBtn.addEventListener('pointerup', (e) => {
  sprintBtn.classList.remove('active');
  touchIntent.sprint = false;
});
sprintBtn.addEventListener('pointercancel', (e) => {
  sprintBtn.classList.remove('active');
  touchIntent.sprint = false;
});

// ---- Input: keyboard ---------------------------------------------
const kbKeys = new Set();
window.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright','shift','control'].includes(k)) {
    kbKeys.add(k);
    markInputMode('keyboard');
    e.preventDefault();
  }
});
window.addEventListener('keyup', (e) => {
  kbKeys.delete(e.key.toLowerCase());
});
window.addEventListener('blur', () => kbKeys.clear());

function readKeyboardIntent() {
  let dx = 0, dy = 0;
  if (kbKeys.has('w') || kbKeys.has('arrowup'))    dy -= 1;
  if (kbKeys.has('s') || kbKeys.has('arrowdown'))  dy += 1;
  if (kbKeys.has('a') || kbKeys.has('arrowleft'))  dx -= 1;
  if (kbKeys.has('d') || kbKeys.has('arrowright')) dx += 1;
  const m = Math.hypot(dx, dy);
  if (m > 0) { dx /= m; dy /= m; }
  return {
    dx, dy,
    mag: m > 0 ? 1 : 0,
    sprint: kbKeys.has('shift'),
    walk:   kbKeys.has('control'),
  };
}

// ---- Input mode indicator ----------------------------------------
let lastInputMode = null;
let lastInputAt = 0;
function markInputMode(mode) {
  lastInputMode = mode;
  lastInputAt = performance.now();
  document.getElementById('input-mode').textContent = mode;
}

// Poll input and write it into slot 0's intent every render frame
function pollAndApplyInput() {
  // Prefer whichever source was last active
  const kb = readKeyboardIntent();
  const kbActive = kb.mag > 0 || kb.sprint || kb.walk;
  const touchActive = touchIntent.mag > 0 || touchIntent.sprint;

  let use;
  if (kbActive && !touchActive)      use = kb;
  else if (touchActive && !kbActive) use = touchIntent;
  else if (kbActive && touchActive)  use = lastInputMode === 'keyboard' ? kb : touchIntent;
  else                                use = { dx:0, dy:0, mag:0, sprint:false, walk:false };

  const me = entities[YOUR_SLOT];
  me.iDx = use.dx;
  me.iDy = use.dy;
  me.iSprint = use.sprint;
  me.iWalk = use.walk;
}

// ---- Rendering ---------------------------------------------------
const canvas = document.getElementById('pitch');
const ctx = canvas.getContext('2d');
let dpr = Math.max(1, window.devicePixelRatio || 1);
let scale = 1, offX = 0, offY = 0;

function resizeCanvas() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  const w = window.innerWidth;
  const h = window.innerHeight;
  canvas.width  = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  // Fit pitch to viewport with some padding
  const pad = 0.92;
  scale = Math.min(w / PITCH_L, h / PITCH_W) * pad;
  offX = w / 2;
  offY = h / 2;
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', resizeCanvas);
resizeCanvas();

function toPx(x, y) {
  // pitch (m) → screen (px). Y flips (pitch y+ is "north", screen y+ is down).
  return [offX + x * scale, offY + y * scale];
}

function drawPitch() {
  const [x0, y0] = toPx(-HALF_L, -HALF_W);
  const [x1, y1] = toPx( HALF_L,  HALF_W);
  // Grass stripes
  const stripes = 10;
  const stripeW = (x1 - x0) / stripes;
  for (let i = 0; i < stripes; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#2f6b3f' : '#356f45';
    ctx.fillRect(x0 + i * stripeW, y0, stripeW, y1 - y0);
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = Math.max(1, scale * 0.12);

  // Outer boundary
  ctx.strokeRect(x0, y0, x1 - x0, y1 - y0);

  // Halfway line
  const [midX] = toPx(0, 0);
  ctx.beginPath();
  ctx.moveTo(midX, y0);
  ctx.lineTo(midX, y1);
  ctx.stroke();

  // Centre circle (9.15 m radius)
  const [cx, cy] = toPx(0, 0);
  ctx.beginPath();
  ctx.arc(cx, cy, 9.15 * scale, 0, Math.PI * 2);
  ctx.stroke();
  // Centre spot
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(cx, cy, Math.max(2, scale * 0.3), 0, Math.PI * 2); ctx.fill();

  // Penalty areas (16.5 × 40.32 m) at both ends
  for (const sign of [-1, 1]) {
    const [px0, py0] = toPx(sign * (HALF_L - 16.5), -20.16);
    const [px1, py1] = toPx(sign * HALF_L,           20.16);
    ctx.strokeRect(Math.min(px0, px1), Math.min(py0, py1), Math.abs(px1 - px0), Math.abs(py1 - py0));
    // 6-yard box (5.5 × 18.32 m)
    const [gx0, gy0] = toPx(sign * (HALF_L - 5.5), -9.16);
    const [gx1, gy1] = toPx(sign * HALF_L,          9.16);
    ctx.strokeRect(Math.min(gx0, gx1), Math.min(gy0, gy1), Math.abs(gx1 - gx0), Math.abs(gy1 - gy0));
    // Penalty spot (11 m from goal line)
    const [spx, spy] = toPx(sign * (HALF_L - 11), 0);
    ctx.beginPath(); ctx.arc(spx, spy, Math.max(2, scale * 0.3), 0, Math.PI * 2); ctx.fill();
  }
}

// Interpolation: find two snapshots straddling render time
function getInterpEntities(renderT) {
  if (snapshots.length === 0) return entities.map(e => ({x:e.x, y:e.y, heading:e.heading, motion:e.motion}));
  // Render slightly in the past (interpolation delay = 1 tick)
  const target = renderT - TICK_MS * 1.1;
  let a = snapshots[0], b = snapshots[snapshots.length - 1];
  for (let i = 0; i < snapshots.length - 1; i++) {
    if (snapshots[i].t <= target && snapshots[i+1].t >= target) {
      a = snapshots[i]; b = snapshots[i+1]; break;
    }
  }
  if (a === b) return a.ents.map(x => ({...x}));
  const span = b.t - a.t;
  const t = span > 0 ? Math.max(0, Math.min(1, (target - a.t) / span)) : 0;
  return a.ents.map((ea, i) => {
    const eb = b.ents[i];
    // shortest-arc heading lerp
    let dh = eb.heading - ea.heading;
    while (dh >  Math.PI) dh -= 2 * Math.PI;
    while (dh < -Math.PI) dh += 2 * Math.PI;
    return {
      x: ea.x + (eb.x - ea.x) * t,
      y: ea.y + (eb.y - ea.y) * t,
      heading: ea.heading + dh * t,
      motion: eb.motion,
    };
  });
}

function drawEntity(e, meta, isYou) {
  const [px, py] = toPx(e.x, e.y);
  const team = TEAMS[meta.team];
  const r = Math.max(6, scale * 0.55);

  // Motion-tinted heading arrow
  const ah = r * 2.4;
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = Math.max(1, scale * 0.08);
  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.lineTo(px + Math.cos(e.heading) * ah, py + Math.sin(e.heading) * ah);
  ctx.stroke();

  // You-ring
  if (isYou) {
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = Math.max(2, scale * 0.15);
    ctx.beginPath(); ctx.arc(px, py, r + 4, 0, Math.PI * 2); ctx.stroke();
  }

  // Body
  ctx.fillStyle = team.color;
  ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = Math.max(1, scale * 0.06);
  ctx.stroke();

  // Sprint highlight
  if (e.motion === 3) {
    ctx.strokeStyle = 'rgba(255,120,80,0.9)';
    ctx.lineWidth = Math.max(1.5, scale * 0.1);
    ctx.beginPath(); ctx.arc(px, py, r + 2, 0, Math.PI * 2); ctx.stroke();
  }

  // Name label
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.font = `${Math.max(10, scale * 0.55)}px system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(meta.name, px, py - r - 3);
}

// ---- Roster UI ---------------------------------------------------
function buildRoster() {
  const ul = document.getElementById('roster-list');
  ul.innerHTML = '';
  for (const e of entities) {
    const li = document.createElement('li');
    const dot = document.createElement('span'); dot.className = 'dot'; dot.style.background = TEAMS[e.team].color;
    li.appendChild(dot);
    const nm = document.createElement('span'); nm.textContent = e.name;
    li.appendChild(nm);
    if (e.id === YOUR_SLOT) {
      const you = document.createElement('span'); you.className = 'you-marker'; you.textContent = 'YOU';
      li.appendChild(you);
    }
    ul.appendChild(li);
  }
}

// ---- Top-of-frame HUD updates ------------------------------------
function updateHUD() {
  // Match clock
  const secs = Math.floor((performance.now() - matchStartMs) / 1000);
  const mm = String(Math.floor(secs / 60)).padStart(2, '0');
  const ss = String(secs % 60).padStart(2, '0');
  document.getElementById('match-clock').textContent = `${mm}:${ss}`;

  // Your motion + stamina
  const me = entities[YOUR_SLOT];
  document.getElementById('you-motion').textContent = MOTION_LABEL[me.motion];
  const fill = document.getElementById('stamina-fill');
  fill.style.width = (me.stamina * 100).toFixed(1) + '%';
  fill.classList.remove('low', 'empty');
  if (me.stamina < 0.05) fill.classList.add('empty');
  else if (me.stamina < 0.30) fill.classList.add('low');
}

// ---- Wake lock (mobile only, best-effort) ------------------------
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      const lock = await navigator.wakeLock.request('screen');
      document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState === 'visible') {
          try { await navigator.wakeLock.request('screen'); } catch (_) {}
        }
      });
    }
  } catch (_) { /* ignore */ }
}
if ('matchMedia' in window && matchMedia('(pointer: coarse)').matches) requestWakeLock();

// ---- Auto-detect initial input mode ------------------------------
if ('matchMedia' in window && matchMedia('(pointer: coarse)').matches) markInputMode('touch');
else markInputMode('keyboard');

// ---- Render loop -------------------------------------------------
function frame() {
  pollAndApplyInput();

  // HiDPI transform: apply once per frame
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#0e1a12';
  ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);

  drawPitch();

  const interp = getInterpEntities(performance.now());
  for (let i = 0; i < entities.length; i++) {
    drawEntity(interp[i], entities[i], i === YOUR_SLOT);
  }

  updateHUD();
  requestAnimationFrame(frame);
}

spawn();
buildRoster();
requestAnimationFrame(frame);
</script>
